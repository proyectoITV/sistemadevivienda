{% extends 'base.html' %}

{% block content %}
<div class="container-fluid my-4">
    <div class="d-flex justify-content-between align-items-center mb-4 flex-wrap gap-2">
        <h2 class="mb-0"><i class="fas fa-truck-loading" style="color: #ab0033;"></i> {{ titulo }}</h2>
        <a href="{% url 'listar_proveedores_vehiculos' %}" class="btn btn-outline-secondary"><i class="fas fa-arrow-left"></i> Volver</a>
    </div>

    <div class="card shadow-sm" style="max-width: 760px;">
        <div class="card-header" style="background: #f7efe5;">
            <h5 class="mb-0">Datos del Proveedor</h5>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="{{ form.nombre_proveedor.id_for_label }}" class="form-label fw-semibold">{{ form.nombre_proveedor.label }}</label>
                    {{ form.nombre_proveedor }}
                    {% if form.nombre_proveedor.errors %}<div class="text-danger small mt-1">{{ form.nombre_proveedor.errors|striptags }}</div>{% endif %}
                </div>
                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-primary" style="background: #ab0033; border-color: #ab0033;"><i class="fas fa-save"></i> {{ accion }}</button>
                    <a href="{% url 'listar_proveedores_vehiculos' %}" class="btn btn-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
